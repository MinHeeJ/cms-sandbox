server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: member-management
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/member_management}
    username: ${SPRING_DATASOURCE_USERNAME:member}
    password: ${SPRING_DATASOURCE_PASSWORD:member}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  observations:
    key-values:
      application: member-management

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

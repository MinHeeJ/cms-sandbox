spring:
  application:
    name: cms
  datasource:
    url: ${CMS_DB_URL:jdbc:postgresql://postgres:5432/cms}
    username: ${CMS_DB_USERNAME:cms}
    password: ${CMS_DB_PASSWORD:cms_password}
  sql:
    init:
      mode: never
server:
  port: ${SERVER_PORT:8080}
cms:
  cors:
    allowed-origins: ${CMS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
  storage:
    local-path: ${CMS_STORAGE_LOCAL_PATH:/data/cms/uploads}
    max-file-size-bytes: ${CMS_STORAGE_MAX_FILE_SIZE_BYTES:10485760}
management:
  endpoints:
    web:
      exposure:
        include: health,info

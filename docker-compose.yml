services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: member_management
      POSTGRES_USER: member
      POSTGRES_PASSWORD: member
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U member -d member_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/member_management
      SPRING_DATASOURCE_USERNAME: member
      SPRING_DATASOURCE_PASSWORD: member
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
